<VirtualHost *:80>
    ServerName map.sustainableoceansociety.co.nz
    Header set Cache-Control "max-age=600, public"
    Redirect "/" "https://map.sustainableoceansociety.co.nz"
    ServerAlias map.sustainableoceansociety.co.nz
    DocumentRoot /var/www/map.sustainableoceansociety.co.nz/html
    ErrorLog /var/www/map.sustainableoceansociety.co.nz/log/error.log
    CustomLog /var/www/map.sustainableoceansociety.co.nz/log/requests.log combined
RewriteEngine on
RewriteCond %{SERVER_NAME} =map.sustainableoceansociety.co.nz
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
<filesMatch ".(json|html|css)$">
    Header set Cache-Control "no-store"
</filesMatch>
</VirtualHost>
